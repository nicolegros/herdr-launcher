id = "nicolegros.herdr-launcher"
name = "Herdr Launcher"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "A fuzzy directory picker that creates or focuses herdr workspaces. Configure scan paths and launch with a keybinding to quickly jump to any project."
platforms = ["linux", "macos"]

[[build]]
command = ["sh", "scripts/build.sh"]

[[actions]]
id = "open"
title = "Herdr Launcher: Open"
command = ["./bin/herdr-launcher", "open"]

[[panes]]
id = "picker"
title = "Herdr Launcher"
placement = "overlay"
command = ["./bin/herdr-launcher", "picker"]
