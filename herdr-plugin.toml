id = "nicolegros.herdr-launcher"
name = "Herdr Launcher"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "A fuzzy directory picker that creates or focuses herdr workspaces. Configure scan paths and launch with a keybinding to quickly jump to any project."
platforms = ["linux", "macos"]

[[build]]
command = ["sh", "scripts/build.sh"]

[[actions]]
id = "open"
title = "Herdr Launcher: Open"
command = ["./bin/herdr-launcher", "open"]

[[actions]]
id = "switch-next"
title = "Herdr Launcher: Switch Next"
command = ["./bin/herdr-launcher", "switch-next"]

[[actions]]
id = "switch-previous"
title = "Herdr Launcher: Switch Previous"
command = ["./bin/herdr-launcher", "switch-previous"]

[[actions]]
id = "switch"
title = "Herdr Launcher: Switch"
command = ["./bin/herdr-launcher", "switch"]

[[events]]
on = "workspace.focused"
command = ["./bin/herdr-launcher", "handle-event"]

[[events]]
on = "workspace.closed"
command = ["./bin/herdr-launcher", "handle-event"]

[[panes]]
id = "picker"
title = "Herdr Launcher"
placement = "overlay"
command = ["./bin/herdr-launcher", "picker"]

[[panes]]
id = "switcher"
title = "Herdr Launcher: Switch"
placement = "overlay"
command = ["./bin/herdr-launcher", "switcher-ui"]
